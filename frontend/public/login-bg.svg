<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#05294a" />
      <stop offset="1" stop-color="#01203a" />
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <!-- base gradient -->
  <rect width="100%" height="100%" fill="url(#g1)" />

  <!-- soft colorful blobs -->
  <g filter="url(#blur)">
    <ellipse cx="280" cy="120" rx="260" ry="120" fill="url(#g2)" />
    <ellipse cx="1200" cy="160" rx="360" ry="160" fill="#0ea5e9" opacity="0.06" />
    <ellipse cx="900" cy="380" rx="420" ry="200" fill="#7c3aed" opacity="0.05" />
  </g>

  <!-- abstract fingerprint-style arcs (decorative) -->
  <g transform="translate(400,220) scale(1.2)" stroke="#06b6d4" stroke-opacity="0.12" fill="none" stroke-width="4">
    <path d="M-120,0 C-80,-70 80,-70 120,0" />
    <path d="M-140,20 C-90,-70 90,-70 140,20" />
    <path d="M-160,40 C-100,-70 100,-70 160,40" />
    <path d="M-180,60 C-110,-70 110,-70 180,60" />
    <path d="M-200,80 C-120,-70 120,-70 200,80" />
    <path d="M-80,0 C-40,-30 40,-30 80,0" stroke-opacity="0.18" />
    <path d="M-40,20 C-10,-10 10,-10 40,20" stroke-opacity="0.22" />
  </g>

  <!-- subtle grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <defs>
      <pattern id="p1" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M40 0 L0 0 0 40" />
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#p1)" />
  </g>

</svg>
